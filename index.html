<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>戶部尚書</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="戶部尚書">
<meta name="theme-color" content="#111110">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #111110; --surf: #1A1A1A; --surf2: #252525; --surf3: #333333;
  --tx: #F2F2F2; --tx2: #A0A0A0; --tx3: #777777;
  --bd: #333333; --bd2: #444444; --gold: #C8962A; --r: 8px; --r2: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
body { background: var(--bg); color: var(--tx); overflow: hidden; font-size: 14px; }
/* 台灣股市習慣：紅漲綠跌 */
.up { color: #E74C3C !important; } 
.dn { color: #2ECC71 !important; }
.empty { text-align: center; padding: 28px 0; font-size: 12px; color: var(--tx3); }
#app { display: none; flex-direction: column; height: 100vh; }
#lock { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
.lk-logo { width: 80px; height: 80px; margin-bottom: 20px; border-radius: 20px; }
.pin-dots { display: flex; gap: 10px; margin: 20px 0; }
.kp { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
.kpb { width: 60px; height: 60px; border-radius: 50%; background: var(--surf2); border: none; color: var(--tx); font-size: 20px; font-weight: 500; display: flex; align-items: center; justify-content: center; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--surf); border-bottom: 1px solid var(--bd); }
.ht { font-size: 18px; font-weight: 700; color: var(--gold); }
.ibtn { background: none; border: none; color: var(--tx); font-size: 18px; cursor: pointer; }
.main { flex: 1; overflow-y: auto; padding: 16px 20px; }
.pane { display: none; } .pane.on { display: block; }
.nav { display: flex; background: var(--surf); border-top: 1px solid var(--bd); padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; background: none; border: none; color: var(--tx3); font-size: 10px; padding: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.nav-btn.on { color: var(--gold); }
.nav-ico { font-size: 18px; }
.sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.s-title { font-size: 15px; font-weight: 700; }
.s-val { font-size: 24px; font-weight: 700; font-family: 'DM Mono', monospace; margin-top: 4px; }
.tbl-wrap { overflow-x: auto; background: var(--surf); border-radius: var(--r2); border: 1px solid var(--bd); margin-bottom: 14px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th, .tbl td { padding: 10px; text-align: right; border-bottom: 1px solid var(--bd2); white-space: nowrap; }
.tbl th:first-child, .tbl td:first-child { text-align: left; }
.addbtn { width: 100%; padding: 12px; background: var(--surf2); border: 1px dashed var(--bd2); color: var(--gold); border-radius: var(--r); font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 20px; }
#settings-panel { position: fixed; top: 0; right: -100%; width: min(360px, 100%); height: 100%; background: var(--surf); border-left: 1px solid var(--bd); z-index: 500; transition: right .3s ease; display: flex; flex-direction: column; }
#settings-panel.open { right: 0; }
.sp-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 499; display: none; }
.sp-overlay.open { display: block; }
.sp-hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--bd); }
.sp-body { flex: 1; overflow-y: auto; padding: 14px; }
.gs-box { background: var(--surf2); border-radius: var(--r2); border: 1px solid var(--bd); padding: 14px; margin-bottom: 12px; }
.gs-head { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.gs-lbl { font-size: 10px; color: var(--tx2); margin-bottom: 3px; display: block; margin-top: 8px; }
.gs-inp { width: 100%; padding: 8px; border-radius: var(--r); border: 1px solid var(--bd2); background: var(--surf); color: var(--tx); }
.btn-row { display: flex; gap: 7px; margin-top: 11px; }
.gs-btn { padding: 8px 14px; border-radius: var(--r); border: none; background: var(--gold); color: #fff; font-size: 12px; font-weight: 600; flex: 1; cursor: pointer; }
.gs-btn-sec { background: var(--surf3); border: 1px solid var(--bd2); color: var(--tx2); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 600; padding: 20px; }
.overlay.on { display: flex; }
.modal { background: var(--surf); border-radius: var(--r2); border: 1px solid var(--bd); padding: 22px; width: 100%; max-width: 340px; max-height: 88vh; overflow-y: auto; }
.fr { margin-bottom: 10px; } .fl { font-size: 10px; color: var(--tx2); margin-bottom: 4px; display: block; }
.fi { width: 100%; padding: 8px 11px; border-radius: var(--r); border: 1px solid var(--bd2); background: var(--surf2); color: var(--tx); font-size: 13px; }
.mact { display: flex; gap: 8px; margin-top: 14px; }
.mc { flex: 1; padding: 9px; border-radius: var(--r); border: 1px solid var(--bd2); background: none; color: var(--tx2); cursor: pointer; }
.ms { flex: 1; padding: 9px; border-radius: var(--r); border: none; background: var(--gold); color: #fff; font-weight: 600; cursor: pointer; }
.cf-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--bd); }
.stk-agg { background: var(--surf2); padding: 14px; border-radius: var(--r2); border: 1px solid var(--bd); margin-bottom: 16px; }
.mini-pie-wrap { display: flex; align-items: center; gap: 15px; margin-bottom: 14px; background: var(--surf); padding: 12px; border-radius: var(--r); border: 1px solid var(--bd); }
.mini-pie-canvas { width: 70px; height: 70px; }
</style>
</head>
<body>

<div id="lock">
  <div style="font-size:20px; font-weight:700; color:var(--gold)">戶部尚書</div>
  <div class="pin-dots" id="pin-dots"></div>
  <div id="perr" style="color:var(--gold); font-size:12px; height:16px;"></div>
  <div class="kp">
    <button class="kpb" onclick="pk(1)">1</button><button class="kpb" onclick="pk(2)">2</button><button class="kpb" onclick="pk(3)">3</button>
    <button class="kpb" onclick="pk(4)">4</button><button class="kpb" onclick="pk(5)">5</button><button class="kpb" onclick="pk(6)">6</button>
    <button class="kpb" onclick="pk(7)">7</button><button class="kpb" onclick="pk(8)">8</button><button class="kpb" onclick="pk(9)">9</button>
    <div></div><button class="kpb" onclick="pk(0)">0</button><button class="kpb" onclick="pdel()">⌫</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="ht">戶部尚書</div>
    <div style="display:flex; gap:15px;">
      <button class="ibtn" onclick="doSync()">🔄</button>
      <button class="ibtn" onclick="openSP()">⚙️</button>
    </div>
  </div>
  
  <div class="main">
    <div id="b-amt" style="font-size:32px; font-weight:700; font-family:'DM Mono',monospace; text-align:center; margin-bottom:4px;">NT$ 0</div>
    <div id="b-pnl" style="text-align:center; font-size:12px; margin-bottom:20px;"></div>

    <div id="pane-cashflow" class="pane on">
      <div class="stk-agg" style="height:200px; position:relative;">
        <canvas id="dc"></canvas>
      </div>
      <div class="sec-hdr"><div class="s-title">近期變動</div></div>
      <div id="cf-list"></div>
    </div>

    <div id="pane-stocks" class="pane">
      <div class="stk-agg">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px;">
          <div><div style="font-size:11px; color:var(--tx2);">股票總資產</div><div class="s-val" id="stk-tot">NT$ 0</div></div>
        </div>
      </div>
      <div id="detail-tw">
        <div class="sec-hdr"><div><div class="s-title">台股</div><div class="s-val" id="tw-val">NT$ 0</div></div></div>
        <div class="mini-pie-wrap">
          <div class="mini-pie-canvas"><canvas id="tw-mini-pie"></canvas></div>
          <div id="tw-mini-legend" style="font-size:12px;"></div>
        </div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th>股票</th><th>股數</th><th>現價</th><th>市值</th><th>損益</th></tr></thead>
            <tbody id="tw-body"></tbody>
          </table>
        </div>
        <button class="addbtn" onclick="showM('tw')">＋ 新增台股交易</button>
      </div>
      <div id="detail-us">
        <div class="sec-hdr"><div><div class="s-title">美股</div><div class="s-val" id="us-val">NT$ 0</div></div></div>
        <div class="mini-pie-wrap">
          <div class="mini-pie-canvas"><canvas id="us-mini-pie"></canvas></div>
          <div id="us-mini-legend" style="font-size:12px;"></div>
        </div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th>股票</th><th>股數</th><th>現價</th><th>市值</th><th>損益</th></tr></thead>
            <tbody id="us-body"></tbody>
          </table>
        </div>
        <button class="addbtn" onclick="showM('us')">＋ 新增美股交易</button>
      </div>
      <div id="detail-intl">
        <div class="sec-hdr"><div><div class="s-title">他國股票</div><div class="s-val" id="intl-val">NT$ 0</div></div></div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th>股票</th><th>市場</th><th>股數</th><th>市值</th></tr></thead>
            <tbody id="intl-body"></tbody>
          </table>
        </div>
        <button class="addbtn" onclick="showM('intl')">＋ 新增他國股票</button>
      </div>
    </div>

    <div id="pane-fx" class="pane">
      <div class="sec-hdr"><div><div class="s-title">外幣總資產</div><div class="s-val" id="fx-val">NT$ 0</div></div></div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>幣別</th><th>數量</th><th>匯率</th><th>約當台幣</th></tr></thead>
          <tbody id="fx-body"></tbody>
        </table>
      </div>
      <button class="addbtn" onclick="showM('fx')">＋ 新增外幣</button>
    </div>

    <div id="pane-crypto" class="pane">
      <div class="sec-hdr"><div><div class="s-title">加密貨幣</div><div class="s-val" id="cr-val">NT$ 0</div></div></div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>幣別</th><th>數量</th><th>現價</th><th>約當台幣</th></tr></thead>
          <tbody id="cr-body"></tbody>
        </table>
      </div>
      <button class="addbtn" onclick="showM('crypto')">＋ 新增加密貨幣</button>
    </div>

    <div id="pane-emergency" class="pane">
      <div class="sec-hdr"><div><div class="s-title">緊急備用金</div><div class="s-val" id="em-bal">NT$ 0</div></div></div>
      <div style="background:var(--surf2); border-radius:var(--r); padding:14px; border:1px solid var(--bd); margin-bottom:14px;">
        <div style="margin-bottom:10px;">手動調整備用金：</div>
        <input class="gs-inp" id="em-input" type="number" placeholder="輸入金額">
        <div class="btn-row">
          <button class="gs-btn" onclick="emAdjust('add')">＋ 存入</button>
          <button class="gs-btn gs-btn-sec" onclick="emAdjust('sub')">－ 提取</button>
        </div>
      </div>
    </div>

    <div id="pane-other" class="pane">
      <div class="sec-hdr"><div><div class="s-title">其他資產</div><div class="s-val" id="oth-val">NT$ 0</div></div></div>
      <div class="tbl-wrap">
        <table class="tbl"><tbody id="oth-body"></tbody></table>
      </div>
      <button class="addbtn" onclick="showM('other')">＋ 新增其他資產</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn on" onclick="navTo('cashflow',this)"><span class="nav-ico">⇅</span>總覽</button>
    <button class="nav-btn" onclick="navTo('stocks',this)"><span class="nav-ico">📈</span>股票</button>
    <button class="nav-btn" onclick="navTo('fx',this)"><span class="nav-ico">💱</span>外幣</button>
    <button class="nav-btn" onclick="navTo('crypto',this)"><span class="nav-ico">₿</span>加密</button>
    <button class="nav-btn" onclick="navTo('emergency',this)"><span class="nav-ico">🛡</span>備用金</button>
    <button class="nav-btn" onclick="navTo('other',this)"><span class="nav-ico">⊟</span>其他</button>
  </div>
</div>

<div class="sp-overlay" id="sp-ov" onclick="closeSP()"></div>
<div id="settings-panel">
  <div class="sp-hdr"><div class="s-title">設定</div><button class="ibtn" onclick="closeSP()">✕</button></div>
  <div class="sp-body">
    <div class="gs-box">
      <div class="gs-head">Google Sheets 連接</div>
      <label class="gs-lbl">試算表 ID</label><input class="gs-inp" id="gs-id" value="1FUhXesSModk6yJmjZ34Jn2eklwmNJPpfKkAxrwefyS4">
      <label class="gs-lbl">API 金鑰</label><input class="gs-inp" id="gs-key" type="password" placeholder="AIzaSy...">
      <div class="btn-row"><button class="gs-btn" onclick="saveGS()">儲存並連接</button></div>
    </div>
    
    <div class="gs-box">
      <div class="gs-head">資產數據校正 (從Google Sheets同步)</div>
      <div style="font-size:11px; color:var(--tx2); margin-bottom:8px;">一鍵從「戶部尚書資料校正」分頁同步最新的股數與各項資產餘額。</div>
      <div class="btn-row"><button class="gs-btn" onclick="syncCorrection()">同步校正資料</button></div>
    </div>

    <div class="gs-box">
      <div class="gs-head">PIN 碼設定</div>
      <label class="gs-lbl">目前 PIN 碼</label><input class="gs-inp" id="pin-curr" type="password" placeholder="預設 355218">
      <label class="gs-lbl">新 PIN 碼</label><input class="gs-inp" id="pin-new" type="password" placeholder="設定新密碼">
      <div class="btn-row">
        <button class="gs-btn" onclick="savePin()">更新密碼</button>
        <button class="gs-btn gs-btn-sec" onclick="togglePin()">啟用 / 停用</button>
      </div>
      <div class="gs-lbl" id="pin-note" style="color:var(--gold); margin-top:8px;"></div>
    </div>
  </div>
</div>

<div class="overlay" id="modal-ov">
  <div class="modal">
    <div class="mt" id="m-title">新增紀錄</div>
    <div id="m-body"></div>
    <div class="mact">
      <button class="mc" onclick="closeM()">取消</button>
      <button class="ms" onclick="saveM()">儲存</button>
    </div>
  </div>
</div>

<script>
// 狀態初始化
const S = {
  pin: localStorage.getItem('czg_pin') || '355218',
  pinEnabled: localStorage.getItem('czg_pin_enabled') === '1',
  buf: '',
  gsId: localStorage.getItem('czg_gsid') || '1FUhXesSModk6yJmjZ34Jn2eklwmNJPpfKkAxrwefyS4',
  gsKey: localStorage.getItem('czg_gskey') || '',
  usdTwd: 32.5,
  twStocks: JSON.parse(localStorage.getItem('czg_tw') || '[]'),
  usStocks: JSON.parse(localStorage.getItem('czg_us') || '[]'),
  fx: JSON.parse(localStorage.getItem('czg_fx') || '[]'),
  crypto: JSON.parse(localStorage.getItem('czg_cr') || '[]'),
  intl: JSON.parse(localStorage.getItem('czg_intl') || '[]'),
  other: JSON.parse(localStorage.getItem('czg_oth') || '[]'),
  emergency: JSON.parse(localStorage.getItem('czg_em') || '{"balance":0}'),
  expenses: []
};

// 工具函式
const fmt = n => Number(n).toLocaleString('zh-TW', {maximumFractionDigits: 2});
const upcl = v => v >= 0 ? 'up' : 'dn';
const saveL = () => {
  localStorage.setItem('czg_tw', JSON.stringify(S.twStocks));
  localStorage.setItem('czg_us', JSON.stringify(S.usStocks));
  localStorage.setItem('czg_fx', JSON.stringify(S.fx));
  localStorage.setItem('czg_cr', JSON.stringify(S.crypto));
  localStorage.setItem('czg_intl', JSON.stringify(S.intl));
  localStorage.setItem('czg_oth', JSON.stringify(S.other));
  localStorage.setItem('czg_em', JSON.stringify(S.emergency));
};

// 股票自動補全字典
const US_MAP = {'TSLA':'Tesla', 'AMD':'超微', 'AAPL':'Apple', 'GOOG':'Google', 'META':'Meta', 'INTC':'英特爾', 'NVDA':'輝達', 'MSFT':'微軟'};
const INTL_MAP = {'122870.KQ':'YG', '041510.KQ':'SM', '035900.KQ':'JYP', '352820.KS':'HYBE', '142280.KQ':'CUBE'};

function onUSCode(val) { const c=val.trim().toUpperCase(); if(US_MAP[c]) document.getElementById('i1').value=US_MAP[c]; }
function onUSName(val) { const n=val.trim(); for(let k in US_MAP) if(US_MAP[k]===n) document.getElementById('i0').value=k; }
function onIntlCode(val) { const c=val.trim().toUpperCase(); if(INTL_MAP[c]) document.getElementById('i1').value=INTL_MAP[c]; }
function onIntlName(val) { const n=val.trim(); for(let k in INTL_MAP) if(INTL_MAP[k]===n) document.getElementById('i0').value=k; }

// 啟動邏輯 (修復全黑Bug)
document.addEventListener('DOMContentLoaded', () => {
  if (S.pinEnabled) {
    document.getElementById('lock').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  } else {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  }
  document.getElementById('gs-id').value = S.gsId;
  document.getElementById('gs-key').value = S.gsKey;
});

function initApp() { renderAll(); doSync(); }

// PIN 操作
function pk(d) {
  if (S.buf.length >= 6) return;
  S.buf += String(d); updDots();
  if (S.buf.length >= 4) {
    if (S.buf === S.pin) {
      document.getElementById('lock').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initApp();
    } else if (S.buf.length === 6) {
      document.getElementById('perr').textContent = '密碼錯誤';
      setTimeout(() => { S.buf = ''; updDots(); document.getElementById('perr').textContent = ''; }, 1000);
    }
  }
}
function pdel() { S.buf = S.buf.slice(0, -1); updDots(); }
function updDots() {
  const c = document.getElementById('pin-dots');
  c.innerHTML = '';
  for(let i=0; i<6; i++) {
    c.innerHTML += `<div style="width:14px; height:14px; border-radius:50%; border:2px solid var(--gold); background:${i<S.buf.length?'var(--gold)':'transparent'}"></div>`;
  }
}

// PIN 設定
function savePin() {
  const curr = document.getElementById('pin-curr').value;
  const nw = document.getElementById('pin-new').value;
  if(curr !== S.pin) { document.getElementById('pin-note').textContent = '目前密碼錯誤'; return; }
  if(nw.length < 4) { document.getElementById('pin-note').textContent = '新密碼至少4碼'; return; }
  S.pin = nw; localStorage.setItem('czg_pin', nw);
  document.getElementById('pin-note').textContent = '密碼已更新';
}
function togglePin() {
  S.pinEnabled = !S.pinEnabled;
  localStorage.setItem('czg_pin_enabled', S.pinEnabled ? '1' : '0');
  document.getElementById('pin-note').textContent = S.pinEnabled ? 'PIN 已啟用' : 'PIN 已停用';
}

// UI 導航
function navTo(id, btn) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('pane-' + id).classList.add('on');
  btn.classList.add('on');
}
function openSP() { document.getElementById('settings-panel').classList.add('open'); document.getElementById('sp-ov').classList.add('open'); }
function closeSP() { document.getElementById('settings-panel').classList.remove('open'); document.getElementById('sp-ov').classList.remove('open'); }

// 彈窗
let currT = '';
function showM(type) {
  currT = type;
  const b = document.getElementById('m-body');
  if (type==='tw') {
    b.innerHTML = `<div class="fr"><label class="fl">股票代號</label><input class="fi" id="i0"></div><div class="fr"><label class="fl">名稱</label><input class="fi" id="i1"></div><div class="fr"><label class="fl">買入/賣出</label><select class="fi" id="act"><option value="buy">買入</option><option value="sell">賣出</option></select></div><div class="fr"><label class="fl">股數</label><input class="fi" id="i2" type="number"></div><div class="fr"><label class="fl">成交價</label><input class="fi" id="i3" type="number"></div>`;
  } else if (type==='us') {

function closeM() { document.getElementById('modal-ov').classList.remove('on'); }

// 儲存資料
function saveM() {
  const gv = id => document.getElementById(id) ? document.getElementById(id).value : '';
  const act = gv('act');
  if (currT==='tw') {
    const code=gv('i0'), name=gv('i1'), sh=parseFloat(gv('i2'))||0, pr=parseFloat(gv('i3'))||0;
    let ex = S.twStocks.find(x=>x.code===code);
    if(act==='buy') {
      if(ex) { ex.cost = (ex.shares*ex.cost + sh*pr)/(ex.shares+sh); ex.shares+=sh; }
      else S.twStocks.push({code, name, shares:sh, cost:pr, livePrice:null, realPnl:0});
    } else if(ex) { ex.shares -= sh; if(ex.shares<=0) S.twStocks = S.twStocks.filter(x=>x.code!==code); }
  } else if (currT==='us') {
    const ticker=gv('i0'), name=gv('i1'), sh=parseFloat(gv('i2'))||0, pr=parseFloat(gv('i3'))||0;
    let ex = S.usStocks.find(x=>x.ticker===ticker);
    if(act==='buy') {
      if(ex) { ex.costTwd = (ex.shares*ex.costTwd + sh*pr)/(ex.shares+sh); ex.shares+=sh; }
      else S.usStocks.push({ticker, name, shares:sh, costTwd:pr, livePriceUsd:null});
    } else if(ex) { ex.shares -= sh; if(ex.shares<=0) S.usStocks = S.usStocks.filter(x=>x.ticker!==ticker); }
  } else if (currT==='intl') {
    const code=gv('i0'), name=gv('i1'), mkt=gv('mkt'), sh=parseFloat(gv('i2'))||0, pr=parseFloat(gv('i3'))||0;
    let ex = S.intl.find(x=>x.code===code);
    if(act==='buy') {
      if(ex) { ex.costTwd = (ex.shares*ex.costTwd + sh*pr)/(ex.shares+sh); ex.shares+=sh; }
      else S.intl.push({code, name, mkt, shares:sh, costTwd:pr, priceTwd:null});
    } else if(ex) { ex.shares -= sh; if(ex.shares<=0) S.intl = S.intl.filter(x=>x.code!==code); }
  } else if (currT==='fx') {
    const cur=gv('i0').toUpperCase(), amt=parseFloat(gv('i1'))||0, rt=parseFloat(gv('i2'))||0;
    let ex = S.fx.find(x=>x.cur===cur);
    if(act==='buy') {
      if(ex) { ex.amt += amt; } else S.fx.push({cur, amt, rateBuy:rt, rateLive:null});
    } else if(ex) { ex.amt -= amt; if(ex.amt<=0) S.fx = S.fx.filter(x=>x.cur!==cur); }
  } else if (currT==='crypto') {
    const coin=gv('i0').toUpperCase(), amt=parseFloat(gv('i1'))||0, tot=parseFloat(gv('i2'))||0;
    let ex = S.crypto.find(x=>x.coin===coin);
    if(act==='buy') {
      if(ex) { ex.costPer = (ex.amt*ex.costPer + tot)/(ex.amt+amt); ex.amt+=amt; }
      else S.crypto.push({coin, amt, costPer:tot/amt, priceTwd:null});
    } else if(ex) { ex.amt -= amt; if(ex.amt<=0) S.crypto = S.crypto.filter(x=>x.coin!==coin); }
  } else if (currT==='other') {
    S.other.push({name:gv('i0'), val:parseFloat(gv('i1'))||0});
  }
  saveL(); renderAll(); closeM();
}

function emAdjust(act) {
  const amt = parseFloat(document.getElementById('em-input').value) || 0;
  if(amt<=0) return;
  if(act==='add') S.emergency.balance += amt;
  else S.emergency.balance = Math.max(0, S.emergency.balance - amt);
  saveL(); renderAll();
  document.getElementById('em-input').value='';
}

// 資產數據校正 (從Google Sheets直接同步股數)
async function syncCorrection() {
  const gid = '2078256663'; // 戶部尚書資料校正
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${S.gsId}/gviz/tq?tqx=out:csv&gid=${gid}`);
    const text = await res.text();
    const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/(^"|"$)/g, '').trim()));
    
    for(let i=1; i<rows.length; i++) {
      const r = rows[i];
      for(let j=0; j<r.length; j+=2) {
        const code = r[j]; const val = r[j+1];
        if(code && val) {
          const amt = parseFloat(val);
          if(isNaN(amt)) continue;
          
          let found = false;
          S.twStocks.forEach(s => { if(s.code===code || s.name===code) { s.shares = amt; found=true; } }); if(found) continue;
          S.usStocks.forEach(s => { if(s.ticker===code || s.name===code) { s.shares = amt; found=true; } }); if(found) continue;
          S.intl.forEach(s => { if(s.code===code || s.name===code) { s.shares = amt; found=true; } }); if(found) continue;
          S.fx.forEach(s => { if(s.cur===code) { s.amt = amt; found=true; } }); if(found) continue;
          S.crypto.forEach(s => { if(s.coin===code) { s.amt = amt; found=true; } }); if(found) continue;
          if(code === '備用金') S.emergency.balance = amt;
        }
      }
    }
    saveL(); renderAll();
    alert('校正成功！已更新最新數量。');
  } catch(e) {
    alert('同步失敗：' + e.message);
  }
}

// Google Sheets 同步匯率與現價
async function doSync() {
  if(!S.gsId) return;
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${S.gsId}/gviz/tq?tqx=out:csv&gid=102108546`);
    const text = await res.text();
    const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/(^"|"$)/g, '').trim()));
    
    const getVal = (col, row) => parseFloat(rows[row-1]?.[col.charCodeAt(0)-65]) || null;
    
    S.usdTwd = getVal('F', 2) || 32.5; // USDTWD
    
    // 更新匯率
    S.fx.forEach(f => {
      if(f.cur==='KRW') f.rateLive = getVal('F', 4);
      if(f.cur==='JPY') f.rateLive = getVal('F', 3);
      if(f.cur==='CNY') f.rateLive = getVal('F', 5);
      if(f.cur==='THB') f.rateLive = getVal('F', 8);
    });

    saveL(); renderAll();
  } catch(e) { console.log("Sync Error", e); }
}

// 畫面渲染
let pieChart = null;
function renderAll() {
  let twV=0, usV=0, intlV=0, fxV=0, crV=0, othV=0, emV=S.emergency.balance;

  // 台股
  document.getElementById('tw-body').innerHTML = S.twStocks.map(s => {
    let p = s.livePrice || s.cost; let v = p * s.shares; twV += v;
    let pnl = v - (s.cost * s.shares);
    return `<tr><td>${s.name}</td><td>${s.shares}</td><td>${p}</td><td>${fmt(v)}</td><td class="${upcl(pnl)}">${fmt(pnl)}</td></tr>`;
  }).join('');
  document.getElementById('tw-val').textContent = `NT$ ${fmt(twV)}`;

  // 美股
  document.getElementById('us-body').innerHTML = S.usStocks.map(s => {
    let p = s.livePriceUsd ? (s.livePriceUsd * S.usdTwd) : s.costTwd; let v = p * s.shares; usV += v;
    let pnl = v - (s.costTwd * s.shares);
    return `<tr><td>${s.name}</td><td>${s.shares}</td><td>${fmt(p)}</td><td>${fmt(v)}</td><td class="${upcl(pnl)}">${fmt(pnl)}</td></tr>`;
  }).join('');
  document.getElementById('us-val').textContent = `NT$ ${fmt(usV)}`;

  // 他國
  document.getElementById('intl-body').innerHTML = S.intl.map(s => {
    let p = s.priceTwd || s.costTwd; let v = p * s.shares; intlV += v;
    return `<tr><td>${s.name}</td><td>${s.mkt}</td><td>${s.shares}</td><td>${fmt(v)}</td></tr>`;
  }).join('');
  document.getElementById('intl-val').textContent = `NT$ ${fmt(intlV)}`;

  // 外幣
  document.getElementById('fx-body').innerHTML = S.fx.map(s => {
    let r = s.rateLive || s.rateBuy; let v = s.amt * r; fxV += v;
    return `<tr><td>${s.cur}</td><td>${s.amt}</td><td>${r}</td><td>${fmt(v)}</td></tr>`;
  }).join('');
  document.getElementById('fx-val').textContent = `NT$ ${fmt(fxV)}`;

  // 加密
  document.getElementById('cr-body').innerHTML = S.crypto.map(s => {
    let p = s.priceTwd || s.costPer; let v = s.amt * p; crV += v;
    return `<tr><td>${s.coin}</td><td>${s.amt}</td><td>${fmt(p)}</td><td>${fmt(v)}</td></tr>`;
  }).join('');
  document.getElementById('cr-val').textContent = `NT$ ${fmt(crV)}`;

  // 其他 & 備用金
  document.getElementById('oth-body').innerHTML = S.other.map(s => { othV += s.val; return `<tr><td>${s.name}</td><td style="text-align:right">${fmt(s.val)}</td></tr>`; }).join('');
  document.getElementById('oth-val').textContent = `NT$ ${fmt(othV)}`;
  document.getElementById('em-bal').textContent = `NT$ ${fmt(emV)}`;

  // 總計 & 圓餅圖
  let tot = twV + usV + intlV + fxV + crV + othV + emV;
  document.getElementById('b-amt').textContent = `NT$ ${fmt(tot)}`;
  document.getElementById('stk-tot').textContent = `NT$ ${fmt(twV + usV + intlV)}`;

  const ctx = document.getElementById('dc');
  if(ctx && tot > 0) {
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['台股','美股','他國','外幣','加密','備用金','其他'],
        datasets: [{ data: [twV, usV, intlV, fxV, crV, emV, othV], backgroundColor: ['#C8962A','#2ECC71','#3498DB','#E74C3C','#9B59B6','#F1C40F','#95A5A6'], borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels:{color:'#A0A0A0', font:{size:10}} } } }
    });
  }
}
